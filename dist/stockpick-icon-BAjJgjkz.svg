<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Stockpick animated icon</title>
  <desc id="desc">Tiga candlestick yang bergerak di dalam orbit Market Aurora.</desc>
  <defs>
    <radialGradient id="bg" cx="32%" cy="24%" r="88%">
      <stop offset="0" stop-color="#17272a"/>
      <stop offset=".58" stop-color="#0b1218"/>
      <stop offset="1" stop-color="#05070a"/>
    </radialGradient>
    <linearGradient id="bull" x1="0" y1="1" x2="1" y2="0">
      <stop stop-color="#18a77e"/>
      <stop offset="1" stop-color="#65f2c9"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="1" x2="1" y2="0">
      <stop stop-color="#a97827"/>
      <stop offset="1" stop-color="#f4cf82"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .orbit { transform-origin:32px 32px; animation:spin 9s linear infinite; }
    .orbit.alt { animation-direction:reverse; animation-duration:14s; }
    .candle { transform-box:fill-box; transform-origin:center bottom; animation:rise 2.6s cubic-bezier(.22,1,.36,1) infinite; }
    .c2 { animation-delay:-.85s; }
    .c3 { animation-delay:-1.7s; }
    .pulse { transform-origin:center; animation:pulse 2s ease-out infinite; }
    .shine { animation:shine 3.2s ease-in-out infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes rise { 0%,100% { transform:scaleY(.72); opacity:.82; } 50% { transform:scaleY(1); opacity:1; } }
    @keyframes pulse { 0% { transform:scale(.55); opacity:.9; } 70%,100% { transform:scale(1.75); opacity:0; } }
    @keyframes shine { 50% { opacity:.45; } }
    @media (prefers-reduced-motion:reduce) { .orbit,.candle,.pulse,.shine { animation:none; } }
  </style>
  <rect x="2" y="2" width="60" height="60" rx="17" fill="url(#bg)" stroke="#ffffff" stroke-opacity=".12"/>
  <circle cx="32" cy="32" r="23" fill="none" stroke="#2bd8a6" stroke-opacity=".13"/>
  <g class="orbit" fill="none" stroke="#2bd8a6" stroke-linecap="round">
    <path d="M12 32a20 20 0 0 1 34-14" stroke-opacity=".52" stroke-width="1.4"/>
    <circle cx="47" cy="18" r="2" fill="#2bd8a6" stroke="none" filter="url(#glow)"/>
  </g>
  <g class="orbit alt" fill="none" stroke="#d9ac57" stroke-linecap="round">
    <path d="M52 34a20 20 0 0 1-33 14" stroke-opacity=".38"/>
    <circle cx="18" cy="48" r="1.5" fill="#d9ac57" stroke="none"/>
  </g>
  <g filter="url(#glow)">
    <g class="candle c1">
      <path d="M22 23v24" stroke="#2bd8a6" stroke-width="1.8" stroke-linecap="round"/>
      <rect x="18.5" y="30" width="7" height="11" rx="2" fill="url(#bull)"/>
    </g>
    <g class="candle c2">
      <path d="M32 17v30" stroke="#d9ac57" stroke-width="1.8" stroke-linecap="round"/>
      <rect x="28.5" y="23" width="7" height="15" rx="2" fill="url(#gold)"/>
    </g>
    <g class="candle c3">
      <path d="M42 21v26" stroke="#2bd8a6" stroke-width="1.8" stroke-linecap="round"/>
      <rect x="38.5" y="27" width="7" height="12" rx="2" fill="url(#bull)"/>
    </g>
  </g>
  <circle class="pulse" cx="49" cy="14" r="4" fill="none" stroke="#2bd8a6" stroke-opacity=".55"/>
  <path class="shine" d="M13 26C19 12 38 7 50 18" fill="none" stroke="#fff" stroke-opacity=".16" stroke-linecap="round"/>
</svg>
